<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de perfil - Starter</title>
</head>
<body>
  <main class="card">
    <img class="card__avatar" src="https://i.pravatar.cc/150?img=32" alt="Foto de perfil de Lucia Fernandez">
    <h1 class="card__name">Lucia Fernandez</h1>
    <p class="card__role">Disenadora UX/UI</p>
    <p class="card__bio">Crea experiencias digitales simples, accesibles y centradas en las personas.</p>

    <section class="card__stats" aria-label="Estadisticas del perfil">
      <div class="stat">
        <span class="stat__value">42</span>
        <span class="stat__label">Proyectos</span>
      </div>
      <div class="stat">
        <span class="stat__value">3.1k</span>
        <span class="stat__label">Seguidores</span>
      </div>
      <div class="stat">
        <span class="stat__value">156</span>
        <span class="stat__label">Siguiendo</span>
      </div>
    </section>

    <div class="card__actions">
      <button class="btn btn--primary" type="button">Seguir</button>
      <button class="btn btn--secondary" type="button">Mensaje</button>
    </div>
  </main>
</body>
</html>
