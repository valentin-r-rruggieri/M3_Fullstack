<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de perfil - Valenti Ruggieri</title>
  <style>
    /* === BASE: MOBILE 320px+ === */
    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: Arial, Helvetica, sans-serif;
      background: #f1f5f9;
      color: #111827;
    }

    .card {
      width: 100%;
      padding: 1rem;
      text-align: center;
      background: #ffffff;
      border-radius: 1rem;
      box-shadow: 0 1rem 2rem rgba(15, 23, 42, 0.1);
    }

    .card__avatar {
      width: 80px;
      height: 80px;
      display: block;
      margin: 0 auto 1rem;
      border-radius: 50%;
      object-fit: cover;
    }

    .card__name {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .card__role {
      margin: 0.25rem 0 0;
      color: #6b7280;
      font-size: 1rem;
      line-height: 1.5;
    }

    .card__bio {
      margin: 1rem 0 0;
      color: #6b7280;
      line-height: 1.6;
    }

    .card__stats {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }

    .stat {
      width: 100%;
    }

    .stat__value {
      display: block;
      font-weight: 700;
      color: #111827;
      font-size: 1.125rem;
      line-height: 1.3;
    }

    .stat__label {
      display: block;
      margin-top: 0.125rem;
      color: #6b7280;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .card__actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      min-height: 44px;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid #111827;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .btn--primary {
      background: #111827;
      color: #ffffff;
    }

    .btn--primary:hover {
      background: #374151;
    }

    .btn--secondary {
      background: transparent;
      color: #111827;
    }

    .btn--secondary:hover {
      background: #f9fafb;
    }

    /* === TABLET: 768px+ === */
    @media (min-width: 768px) {
      .card {
        padding: 1.5rem;
      }

      .card__avatar {
        width: 100px;
        height: 100px;
      }

      .card__stats {
        flex-direction: row;
        justify-content: center;
        gap: 1.5rem;
      }

      .stat {
        width: auto;
        min-width: 7rem;
      }

      .stat + .stat {
        border-left: 1px solid #e5e7eb;
        padding-left: 1.5rem;
      }

      .card__actions {
        flex-direction: row;
        justify-content: center;
      }
    }

    /* === DESKTOP: 1024px+ === */
    @media (min-width: 1024px) {
      .card {
        max-width: 32rem;
        margin: 0 auto;
        padding: 2rem;
      }

      .btn {
        padding-right: 1.5rem;
        padding-left: 1.5rem;
      }
    }
  </style>
</head>
